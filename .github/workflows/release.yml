name: Create WordPress Plugin Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.2.1)"
        required: true
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          BASE_VERSION="${VERSION%%-*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          if echo "$VERSION" | grep -qi "beta\|alpha\|rc"; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Creating release for version: $VERSION (base: $BASE_VERSION)"

      - name: Check if release already exists
        id: check-release
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${{ steps.version.outputs.version }}")

          if [ "$RESPONSE" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.version.outputs.version }} already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up PHP
        if: steps.check-release.outputs.exists == 'false'
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          coverage: none

      - name: Install gettext
        if: steps.check-release.outputs.exists == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install --yes gettext

      - name: Create plugin ZIP
        if: steps.check-release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          bash .github/scripts/build-plugin-zip.sh "slytranslate-${VERSION}.zip"
          bash .github/scripts/verify-plugin-zip.sh "slytranslate-${VERSION}.zip"
          ls -la "slytranslate-${VERSION}.zip"

      - name: Generate changelog
        if: steps.check-release.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE_VERSION="${{ steps.version.outputs.base_version }}"
          awk -v ver="$BASE_VERSION" '$0 ~ "^## \\[" ver "\\]" { flag=1; next } flag && /^## \[/ { exit } flag' CHANGELOG.md > changelog.txt

          if [ -s changelog.txt ]; then
            {
              echo "## $BASE_VERSION"
              echo ""
              cat changelog.txt
            } > changelog.release.txt
            mv changelog.release.txt changelog.txt
          fi

          if [ ! -s changelog.txt ]; then
            echo "Release version $VERSION" > changelog.txt
            echo "" >> changelog.txt
            echo "See CHANGELOG.md for detailed changes." >> changelog.txt
          fi
          cat changelog.txt

      - name: Create GitHub Release
        if: steps.check-release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: slytranslate v${{ steps.version.outputs.version }}
          body_path: changelog.txt
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: slytranslate-${{ steps.version.outputs.version }}.zip

      - name: Release Summary
        if: steps.check-release.outputs.exists == 'false'
        run: |
          echo "Successfully created release v${{ steps.version.outputs.version }}"
          echo "https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"
          unzip -l "slytranslate-${{ steps.version.outputs.version }}.zip"

      - name: Skip Release (Already Exists)
        if: steps.check-release.outputs.exists == 'true'
        run: |
          echo "Release v${{ steps.version.outputs.version }} already exists, skipping"
          echo "https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"
